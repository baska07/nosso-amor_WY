<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Amor</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #fff5f5; color: #d63384; padding: 50px; }
        img { width: 300px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #contador { font-size: 1.6rem; font-weight: bold; background: white; padding: 20px; border-radius: 50px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <h1>Para o meu amor ❤️</h1>
    <img src="foto.jpg" alt="Nossa Foto">
    <br>
    <div id="contador">Calculando...</div>
    <script>
        const dataInicio = new Date("2025-12-20T18:00:00");
        function atualizar() {
            const agora = new Date();
            const diff = agora - dataInicio;
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutos = Math.floor((diff / 1000 / 60) % 60);
            const segundos = Math.floor((diff / 1000) % 60);
            document.getElementById("contador").innerHTML = `${dias} dias, ${horas}h, ${minutos}m e ${segundos}s`;
        }
        setInterval(atualizar, 1000);
        atualizar();
    </script>
</body>
</html>
